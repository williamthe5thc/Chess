<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Chess for Dad" />
  <meta name="theme-color" content="#1a1a2e" />
  <link rel="manifest" href="manifest.json" />
  <title>Chess for Dad</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Splash Screen -->
  <div id="splash">
    <div class="splash-inner">
      <div class="splash-knight">♞</div>
      <h1 class="splash-title">Happy Father's Day, Dad 🎉</h1>
      <p class="splash-subtitle">A game made just for you</p>
      <div class="splash-mode-group">
        <button id="splash-vs-computer" class="btn-gold splash-mode-btn">🤖 vs Computer</button>
        <button id="splash-vs-human" class="btn-mode-secondary splash-mode-btn">👥 vs Human</button>
      </div>
    </div>
  </div>

  <!-- Main App -->
  <div id="app" class="hidden">
    <header class="app-header">
      <span class="header-title">♞ Chess for Dad</span>
    </header>

    <!-- Status Bar -->
    <div id="status-bar" class="status-bar">Your turn</div>
    <!-- Move Quality (persists until next move) -->
    <div id="quality-bar" class="quality-bar"></div>

    <!-- Eval Bar (shown only when eval is enabled) -->
    <div id="eval-bar-wrap" class="eval-bar-wrap">
      <div class="eval-bar-inner">
        <div id="eval-bar-white" class="eval-bar-white"></div>
      </div>
      <span id="eval-score" class="eval-score">0.0</span>
    </div>

    <!-- Chess Board -->
    <div id="board-wrap">
      <div id="board"></div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <div class="action-row">
        <button id="hint-btn" class="btn-action">💡 Hint</button>
        <button id="undo-btn" class="btn-action">↩ Undo</button>
        <button id="new-game-btn" class="btn-gold btn-new-game">New Game</button>
      </div>
      <div class="piece-set-row">
        <span class="set-label">Pieces:</span>
        <button class="set-btn active" data-set="classic">♟ Classic</button>
        <button class="set-btn" data-set="family">👨‍👩‍👧 Family</button>
      </div>
    </div>

    <!-- Settings Panel -->
    <div class="collapsible-section">
      <button id="settings-toggle" class="section-toggle">
        ⚙ Settings <span id="settings-arrow">▼</span>
      </button>
      <div id="settings-panel" class="section-panel">
        <div class="settings-content">
          <div class="elo-row">
            <span class="elo-label">Strength: <strong id="elo-value">800</strong></span>
            <span id="elo-tier" class="elo-tier">Casual</span>
          </div>
          <div class="slider-row">
            <span class="slider-edge">250</span>
            <input type="range" id="elo-slider" class="elo-slider"
                   min="250" max="3000" step="25" value="800" />
            <span class="slider-edge">3000</span>
          </div>
          <div class="toggle-row">
            <button id="toggle-eval" class="toggle-btn" data-active="false">
              📊 Position Eval
            </button>
            <button id="toggle-preview" class="toggle-btn" data-active="false">
              🔍 Move Preview
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Move History -->
    <div class="collapsible-section">
      <button id="history-toggle" class="section-toggle">
        Move History <span id="history-arrow">▼</span>
      </button>
      <div id="history-panel" class="section-panel">
        <div id="history-list" class="history-list"></div>
      </div>
    </div>
  </div>

  <!-- Promotion Modal -->
  <div id="promotion-modal" class="hidden">
    <div class="promotion-box">
      <p>Promote your pawn</p>
      <div class="promotion-pieces">
        <button class="promo-btn" data-piece="q">♕</button>
        <button class="promo-btn" data-piece="r">♖</button>
        <button class="promo-btn" data-piece="b">♗</button>
        <button class="promo-btn" data-piece="n">♘</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
